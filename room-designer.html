<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Designer | Dynamic Media</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
    #canvas-container { width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <script type="module">
    import * as THREE from 'https://esm.sh/three@0.160.0';
    import { OrbitControls } from 'https://esm.sh/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const ACCENT = '#00aeef';
    const WALL = '#00aeef';
    const FURN = '#00aeef';
    const TABLE = '#00aeef';
    const CHAIR = '#00aeef';
    const DARK = '#00aeef';
    const FLOOR = '#00aeef';
    const KITCHEN = '#00aeef';
    const STOVE = '#00aeef';
    const FRIDGE = '#00aeef';

    function createEdges(mesh, color, scale = 1) {
      const edges = new THREE.EdgesGeometry(mesh.geometry, 15);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.8 }));
      line.position.copy(mesh.position);
      line.rotation.copy(mesh.rotation);
      line.scale.setScalar(scale);
      return line;
    }

    function wall(scene, x, y, z, w, h, d) {
      const g = new THREE.BoxGeometry(w, h, d);
      const m = new THREE.MeshStandardMaterial({ color: WALL, transparent: true, opacity: 0.15 });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.set(x, y, z);
      scene.add(mesh);
      scene.add(createEdges(mesh, ACCENT));
    }

    function furniture(scene, x, y, z, w, h, d, color = FURN, rx = 0, ry = 0, rz = 0) {
      const g = new THREE.BoxGeometry(w, h, d);
      const m = new THREE.MeshStandardMaterial({ color, transparent: true, opacity: 0.25 });
      const mesh = new THREE.Mesh(g, m);
      mesh.position.set(x, y, z);
      mesh.rotation.set(rx, ry, rz);
      scene.add(mesh);
      scene.add(createEdges(mesh, ACCENT));
    }

    function diningTable(scene, px, py, pz) {
      const top = new THREE.Mesh(
        new THREE.CylinderGeometry(0.55, 0.55, 0.06, 16),
        new THREE.MeshStandardMaterial({ color: TABLE, transparent: true, opacity: 0.3 })
      );
      top.position.set(px, py + 0.45, pz);
      scene.add(top);
      scene.add(createEdges(top, ACCENT));
      furniture(scene, px, py + 0.2, pz, 0.12, 0.4, 0.12, TABLE);
      [0, Math.PI / 2, Math.PI, (3 * Math.PI) / 2].forEach((angle) => {
        const x = px + Math.sin(angle) * 0.85;
        const z = pz + Math.cos(angle) * 0.85;
        furniture(scene, x, py + 0.28, z, 0.35, 0.04, 0.35, CHAIR);
        furniture(scene, x, py + 0.48, z - 0.16, 0.35, 0.36, 0.04, CHAIR, 0, -angle, 0);
      });
    }

    function boothTable(scene, px, py, pz, rotY = 0) {
      furniture(scene, px, py + 0.45, pz, 1.2, 0.06, 0.6, TABLE, 0, rotY, 0);
      furniture(scene, px, py + 0.2, pz, 0.1, 0.4, 0.1, TABLE, 0, rotY, 0);
      furniture(scene, px, py + 0.4, pz - 0.55, 1.4, 0.8, 0.15, DARK, 0, rotY, 0);
      furniture(scene, px, py + 0.25, pz - 0.38, 1.3, 0.08, 0.2, DARK, 0, rotY, 0);
      furniture(scene, px - 0.3, py + 0.28, pz + 0.5, 0.35, 0.04, 0.35, CHAIR, 0, rotY, 0);
      furniture(scene, px + 0.3, py + 0.28, pz + 0.5, 0.35, 0.04, 0.35, CHAIR, 0, rotY, 0);
      furniture(scene, px - 0.3, py + 0.48, pz + 0.66, 0.35, 0.36, 0.04, CHAIR, 0, rotY, 0);
      furniture(scene, px + 0.3, py + 0.48, pz + 0.66, 0.35, 0.36, 0.04, CHAIR, 0, rotY, 0);
    }

    function barStool(scene, px, py, pz) {
      const seat = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.18, 0.04, 12),
        new THREE.MeshStandardMaterial({ color: CHAIR, transparent: true, opacity: 0.3 })
      );
      seat.position.set(px, py + 0.5, pz);
      scene.add(seat);
      scene.add(createEdges(seat, ACCENT));
      furniture(scene, px, py + 0.24, pz, 0.06, 0.48, 0.06, CHAIR);
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(0.12, 0.015, 8, 16),
        new THREE.MeshStandardMaterial({ color: ACCENT, transparent: true, opacity: 0.3 })
      );
      ring.position.set(px, py + 0.15, pz);
      scene.add(ring);
    }

    function doorOpening(scene, x, y, z, rotX = 0, rotY = 0, rotZ = 0) {
      const curve = new THREE.EllipseCurve(0, 0, 1.2, 1.2, 0, Math.PI / 2, false, 0);
      const points = curve.getPoints(20).map((p) => new THREE.Vector3(p.x, 0, p.y));
      const g = new THREE.BufferGeometry().setFromPoints(points);
      const line = new THREE.Line(g, new THREE.LineBasicMaterial({ color: ACCENT, transparent: true, opacity: 0.5 }));
      line.position.set(x, y, z);
      line.rotation.set(rotX, rotY, rotZ);
      scene.add(line);
    }

    function floorPlane(scene, x, y, z, w, h, color, opacity, rx = -Math.PI / 2) {
      const mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(w, h),
        new THREE.MeshStandardMaterial({ color, transparent: true, opacity })
      );
      mesh.position.set(x, y, z);
      mesh.rotation.x = rx;
      scene.add(mesh);
    }

    function floorPlaneWithEdges(scene, x, y, z, w, h, color, opacity, edgeColor) {
      floorPlane(scene, x, y, z, w, h, color, opacity);
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(w, h));
      plane.position.set(x, y + 0.005, z);
      plane.rotation.x = -Math.PI / 2;
      const edges = new THREE.EdgesGeometry(plane.geometry, 0);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: edgeColor, transparent: true, opacity: 0.15 }));
      line.position.copy(plane.position);
      line.rotation.copy(plane.rotation);
      scene.add(line);
    }

    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(12, 12, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x00aeef, 0.3));
    const dir = new THREE.DirectionalLight(0x00aeef, 0.5);
    dir.position.set(10, 10, 5);
    scene.add(dir);
    const point = new THREE.PointLight(0x00aeef, 0.3);
    point.position.set(0, 5, 0);
    scene.add(point);

    // Floor
    floorPlane(scene, 0, 0, 0, 14, 10, FLOOR, 0.6);

    // Walls
    wall(scene, 0, 1.5, -5, 14, 3, 0.15);
    wall(scene, 0, 1.5, 5, 14, 3, 0.15);
    wall(scene, -7, 1.5, 0, 0.15, 3, 10);
    wall(scene, 7, 1.5, 0, 0.15, 3, 10);
    wall(scene, 3, 1.5, -2.5, 0.12, 3, 5);
    wall(scene, 3, 2.2, -0.5, 0.12, 0.6, 1.5);

    // Dining
    diningTable(scene, -4, 0, -2.5);
    diningTable(scene, -1.5, 0, -2.5);
    diningTable(scene, -4, 0, 0);
    diningTable(scene, -1.5, 0, 0);
    boothTable(scene, -4.5, 0, 3.5, Math.PI);
    boothTable(scene, -2, 0, 3.5, Math.PI);
    diningTable(scene, 0.8, 0, 2.5);

    // Bar
    furniture(scene, 3, 0.55, 2.5, 0.2, 1.1, 4.5, DARK);
    furniture(scene, 3, 1.12, 2.5, 0.7, 0.06, 4.5, TABLE);
    [0.8, 1.6, 2.4, 3.2, 4.0].forEach((z) => barStool(scene, 2.3, 0, z));
    furniture(scene, 3.8, 0.8, 2.5, 0.3, 1.6, 4.5, KITCHEN);

    // Kitchen
    furniture(scene, 5, 0.5, -3.5, 3.5, 1, 0.7, KITCHEN);
    furniture(scene, 5.5, 0.5, -1.5, 2.5, 1, 0.8, STOVE);
    furniture(scene, 6.3, 0.9, -4.3, 1, 1.8, 0.8, FRIDGE);

    // Host stand
    furniture(scene, -5.5, 0.55, 4.2, 0.8, 1.1, 0.5, DARK);

    // Doors
    doorOpening(scene, -6, 0.01, 4.9, -Math.PI / 2, 0, Math.PI);
    doorOpening(scene, 5.5, 0.01, -4.9, -Math.PI / 2, 0, 0);

    // Rugs
    floorPlaneWithEdges(scene, -2.8, 0.01, -1.2, 6, 5, FURN, 0.08, ACCENT);
    floorPlaneWithEdges(scene, 2.8, 0.01, 2.5, 2, 4.5, 0x7c3aed, 0.06, 0xa78bfa);

    // Grid
    const grid = new THREE.GridHelper(30, 30, 0x1e3a5f, 0x00aeef);
    grid.position.y = -0.01;
    grid.material.opacity = 0.4;
    grid.material.transparent = true;
    scene.add(grid);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = true;
    controls.enableZoom = true;
    controls.enableRotate = true;
    controls.minDistance = 5;
    controls.maxDistance = 35;
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.4;

    function resize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', resize);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
